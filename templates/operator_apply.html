<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Application | EV Charging Management</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="background-overlay"></div>

    <div class="login-container">
        <form id="registerForm">
            <div class="login-header">
                <div class="brand-icon">🏢</div>
                <h2>Operator Application</h2>
                <p>Become a partner and manage your own charging stations.</p>
            </div>

            <div class="input-wrapper">
                <div class="input-group">
                    <label for="full_name">Company / Authorized Name</label>
                    <input type="text" id="full_name" required placeholder="e.g. ChargeTech Inc.">
                </div>

                <div class="input-group">
                    <label for="email">Corporate Email Address</label>
                    <input type="email" id="email" required placeholder="contact@company.com">
                </div>

                <div class="input-group">
                    <label for="reg_password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="reg_password" required placeholder="••••••••">
                        <i class="fas fa-eye" id="toggleRegisterPassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888;"></i>
                    </div>
                </div>

                <!-- auth.js'nin okuyacağı role değerini 'operator' olarak sabitliyoruz -->
                <input type="hidden" id="role" value="operator">
            </div>

            <!-- Operatörlere özel bilgilendirme kutusu -->
            <div style="background: rgba(46, 204, 113, 0.1); border: 1px solid #2ecc71; padding: 12px; border-radius: 8px; margin-top: 15px; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-info-circle" style="color: #2ecc71; font-size: 20px;"></i>
                <p style="font-size: 12px; color: #ddd; margin: 0;">By creating this account, you will have access to the operator dashboard to claim and manage stations.</p>
            </div>

            <button type="submit" id="registerBtn" style="margin-top: 20px;">Submit Application</button>

            <!-- Hata / Başarı mesajı -->
            <div id="message"></div>

            <div class="register-section">
                <span>Already a partner?</span>
                <a href="/login">Sign In</a>
            </div>
        </form>
    </div>

    <!-- Mevcut kayıt işlemlerini yürüten script'i doğrudan kullanıyoruz -->
    <script src="/static/auth.js"></script>
</body>
</html>
