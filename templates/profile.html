<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile - EV Charging</title>
    <link rel="stylesheet" href="/static/style.css?v=2">
</head>
<body>

<div class="profile-container">
    <div class="profile-card">

        <!-- BÖLÜM 1: PROFİL GÖRÜNÜMÜ -->
        <div id="profileView">
            <div class="view-header">
                <button class="btn-back" onclick="window.history.back()">
                    <span class="back-icon">←</span> Back
                </button>
            </div>

            <div class="profile-header">
                <div class="avatar-circle"><span id="userNameLetter">S</span></div>
                <h2 id="userName">Loading...</h2>
                <span id="userRoleBadge" class="role-badge">Loading...</span>
            </div>

            <div class="info-row">
                <div class="info-block">
                    <label>Email Address</label>
                    <span id="userEmail">...</span>
                </div>
                <div class="info-block">
                    <label>Wallet Balance</label>
                    <div class="wallet-box">
                        <span id="walletBalance">0.00</span> ₺
                    </div>
                </div>
            </div>

            <div class="vehicle-section">
                <div class="section-header">
                    <h3>My Vehicles</h3>
                    <button class="btn-add-mini" onclick="toggleVehicleView(true)">+ Add</button>
                </div>
                <div id="vehicleList" class="vehicle-grid"></div>
            </div>

            <!-- Account Status alanı JS ile dolacak -->
            <div id="statusContent" class="status-section"></div>

            <button class="btn-logout btn-action" onclick="handleLogout()" style="margin-top: 20px;">
                Sign Out
            </button>
        </div>

        <!-- BÖLÜM 2: ARAÇ EKLEME GÖRÜNÜMÜ -->
        <div id="addView" style="display: none;">
            <div class="view-header">
                <button class="btn-back" onclick="toggleVehicleView(false)">
                    <span class="back-icon">←</span> Back
                </button>
            </div>

            <div class="profile-header" style="margin-top: 10px;">
                <h2 style="font-size: 1.3rem;">Add New Vehicle</h2>
                <p style="color: #666; font-size: 0.85rem;">Enter your vehicle details</p>
            </div>

            <form id="vehicleForm">
                <div class="input-group">
                    <label>Brand</label>
                    <input type="text" id="vBrand" placeholder="e.g. Tesla" required>
                </div>
                <div class="input-group">
                    <label>Model</label>
                    <input type="text" id="vModel" placeholder="e.g. Model 3" required>
                </div>
                <div class="input-group">
                    <label>Plate Number</label>
                    <input type="text" id="vPlate" placeholder="34 ABC 123" required>
                </div>

                <div class="info-row">
                    <div class="input-group">
                        <label>Battery (kWh)</label>
                        <input type="number" id="vBattery" placeholder="75" required>
                    </div>
                    <div class="input-group">
                        <label>Connector</label>
                        <select id="vConnector">
                            <option value="Type 2">Type 2</option>
                            <option value="CCS">CCS</option>
                            <option value="CHAdeMO">CHAdeMO</option>
                        </select>
                    </div>
                </div>

                <div style="margin-top: 20px;">
                    <button type="submit" class="btn-action btn-apply">Save Vehicle</button>
                    <button type="button" class="btn-action btn-logout" style="border-color: #444; color: #888;" onclick="toggleVehicleView(false)">
                        Cancel
                    </button>
                </div>
            </form>
        </div>

    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
