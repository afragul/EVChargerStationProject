<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile - EV Charging</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="profile-container">
    <div class="profile-card" style="position: relative;">

        <!-- YENİ: NOTIFICATION BELL (BİLDİRİM ZİLİ) -->
        <div style="position: absolute; top: 20px; right: 25px; cursor: pointer; z-index: 10;" onclick="toggleNotifs()">
            <i class="fas fa-bell" style="font-size: 24px; color: #f1c40f;"></i>
            <span id="notifBadge" style="position: absolute; top: -5px; right: -8px; background: #e74c3c; color: white; border-radius: 50%; padding: 2px 6px; font-size: 11px; font-weight: bold; display: none;">0</span>
        </div>

        <!-- YENİ: NOTIFICATION DROPDOWN PANEL -->
        <div id="notifPanel" style="display: none; position: absolute; top: 60px; right: 20px; background: #1a2922; border: 1px solid #2ecc71; width: 280px; border-radius: 10px; padding: 15px; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.8);">
            <h4 style="margin: 0 0 10px 0; color: white; border-bottom: 1px solid #333; padding-bottom: 8px;">Notifications</h4>
            <div id="notifList" style="max-height: 250px; overflow-y: auto; font-size: 12px; color: #ddd;">
                <p style="color:#666; text-align:center;">No new notifications.</p>
            </div>
        </div>

        <div id="profileView">
            <div class="view-header">
                <button class="btn-back" onclick="window.location.href='/'">← Back</button>
            </div>

            <div class="profile-header">
                <div class="avatar-circle"><span id="userNameLetter"></span></div>
                <h2 id="userName">Loading...</h2>
                <span id="userRoleBadge" class="role-badge"></span>
            </div>

            <div class="info-row">
                <div class="info-block"><label>Email</label><span id="userEmail"></span></div>
                <div class="info-block">
                    <label>Wallet</label>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span id="walletBalance">0.00</span> ₺
                        <button onclick="openTopUpModal()" class="btn-add-mini" style="background:#28a745;">+ Top Up</button>
                    </div>
                </div>
            </div>

            <!-- Vehicles -->
            <div class="vehicle-section">
                <div class="section-header"><h3>My Vehicles</h3><button class="btn-add-mini" onclick="toggleVehicleView(true)">+ Add</button></div>
                <div id="vehicleList" class="vehicle-grid"></div>
            </div>

            <!-- FAVORITE STATIONS LIST -->
            <div class="vehicle-section" style="margin-top: 25px;">
                <div class="section-header"><h3>Favorite Stations</h3></div>
                <div id="favoriteStationsList" class="vehicle-grid"></div>
            </div>

            <!-- YENİ: CANLI ŞARJ GÖSTERGE PANELİ (Sadece şarj anında görünür) -->
            <div id="liveChargingPanel" class="vehicle-section" style="display:none; margin-top: 25px; background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%); border: 2px solid #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); border-radius: 12px; padding: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">
                    <h3 style="color:white; margin:0;"><i class="fas fa-bolt" style="color:#f1c40f;"></i> LIVE CHARGING</h3>
                    <span style="color:#2ecc71; font-weight:bold; font-size: 12px; animation: pulse 1.5s infinite;">● ENERGY FLOWING</span>
                </div>

                <div style="display:flex; justify-content: space-around; text-align: center; margin-bottom: 20px;">
                    <div>
                        <div style="font-size: 11px; color: #a9cce3; font-weight: bold; letter-spacing: 1px;">ELAPSED TIME</div>
                        <div id="liveTime" style="font-size: 28px; font-weight: bold; color: white; font-family: monospace;">00:00</div>
                    </div>
                    <div>
                        <div style="font-size: 11px; color: #a9cce3; font-weight: bold; letter-spacing: 1px;">ENERGY DELIVERED</div>
                        <div id="liveKwh" style="font-size: 28px; font-weight: bold; color: #2ecc71; font-family: monospace;">0.00 <span style="font-size:14px;">kWh</span></div>
                    </div>
                    <div>
                        <div style="font-size: 11px; color: #a9cce3; font-weight: bold; letter-spacing: 1px;">EST. COST</div>
                        <div id="liveCost" style="font-size: 28px; font-weight: bold; color: #f1c40f; font-family: monospace;">0.00 <span style="font-size:14px;">₺</span></div>
                    </div>
                </div>
                <button id="liveStopBtn" style="background: #e74c3c; border: none; color: white; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight:bold; width:100%; transition: 0.3s; box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);">🛑 STOP CHARGING</button>
            </div>

            <!-- ACTIVE RESERVATIONS LIST -->
            <div class="vehicle-section" style="margin-top: 25px;" id="reservationsSection">
                <div class="section-header"><h3>Active Reservations</h3></div>
                <div id="reservationsList" class="vehicle-grid"></div>
            </div>

            <!-- CHARGING HISTORY LIST -->
            <div class="vehicle-section" style="margin-top: 25px;">
                <div class="section-header"><h3>Charging History</h3></div>
                <div id="historyList" class="vehicle-grid"></div>
            </div>

            <div id="statusContent" class="status-section"></div>
            <button class="btn-logout btn-action" onclick="handleLogout()" style="margin-top: 20px;">Sign Out</button>
        </div>

        <!-- Add Vehicle View -->
        <div id="addView" style="display: none;">
            <div class="view-header"><button class="btn-back" onclick="toggleVehicleView(false)">← Back</button></div>
            <h2 style="margin: 20px 0;">Add New Vehicle</h2>
            <form id="vehicleForm">
                <div class="input-group"><label>Brand</label><input type="text" id="vBrand" required></div>
                <div class="input-group"><label>Model</label><input type="text" id="vModel" required></div>
                <div class="input-group"><label>Plate</label><input type="text" id="vPlate" required></div>
                <div class="info-row">
                    <div class="input-group"><label>Battery (kWh)</label><input type="number" id="vBattery" required></div>
                    <div class="input-group"><label>Connector</label><select id="vConnector"><option value="Type 2">Type 2</option><option value="CCS">CCS</option></select></div>
                </div>
                <button type="submit" class="btn-action btn-apply">Save Vehicle</button>
            </form>
        </div>
    </div>
</div>

<!-- TOP UP MODAL -->
<div id="topUpModal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#1a2922; padding:30px; border-radius:20px; width:300px; text-align:center; border:1px solid #28a745;">
        <h3 style="color:#2ecc71; margin-bottom:20px;">Top Up Wallet</h3>
        <input type="number" id="topUpAmount" placeholder="500" style="width:100%; padding:10px; margin-bottom:20px; border-radius:8px; border:none;">
        <div style="display:flex; gap:10px;">
            <button onclick="closeTopUpModal()" style="flex:1; padding:10px; background:#e74c3c; border:none; border-radius:8px; color:white; cursor:pointer;">Cancel</button>
            <button onclick="submitTopUp()" style="flex:1; padding:10px; background:#28a745; border:none; border-radius:8px; color:white; cursor:pointer;">Confirm</button>
        </div>
    </div>
</div>

<!-- CUSTOM ALERTS -->
<div id="customAlertModal" class="custom-modal-overlay" style="display:none;">
    <div class="custom-modal-box alert-box">
        <h3 id="customAlertTitle" class="modal-title"></h3>
        <p id="customAlertMessage" style="color:#ddd; margin-bottom:20px; line-height:1.4; white-space: pre-wrap;"></p>
        <button onclick="closeCustomAlert()" class="btn-confirm" style="width:100%;">OK</button>
    </div>
</div>

<div id="customConfirmModal" class="custom-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
    <div class="custom-modal-box" style="background:#1a2922; border:1px solid #e74c3c; padding:30px; border-radius:15px; width:320px; text-align:center;">
        <h3 id="customConfirmTitle" style="color:#e74c3c; margin-top:0; margin-bottom:15px;">Confirm Action</h3>
        <p id="customConfirmMessage" style="color:#ddd; margin-bottom:25px; line-height:1.5; font-size:14px;"></p>
        <div style="display:flex; gap:15px;">
            <button onclick="closeCustomConfirm(false)" style="flex:1; padding:12px; background:rgba(255,255,255,0.1); border-radius:8px; color:white; cursor:pointer;">No, Keep it</button>
            <button onclick="closeCustomConfirm(true)" style="flex:1; padding:12px; background:#e74c3c; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold;">Yes</button>
        </div>
    </div>
</div>

<script src="/static/script.js?v=12"></script>
</body>
</html>
