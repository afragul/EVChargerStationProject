<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile - EV Charging</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="profile-container">
    <div class="profile-card">
        <div id="profileView">
            <div class="view-header">
                <button class="btn-back" onclick="window.location.href='/'">← Back</button>
            </div>

            <div class="profile-header">
                <div class="avatar-circle"><span id="userNameLetter"></span></div>
                <h2 id="userName">Loading...</h2>
                <span id="userRoleBadge" class="role-badge"></span>
            </div>

            <div class="info-row">
                <div class="info-block"><label>Email</label><span id="userEmail"></span></div>
                <div class="info-block">
                    <label>Wallet</label>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span id="walletBalance">0.00</span> ₺
                        <button onclick="openTopUpModal()" class="btn-add-mini" style="background:#28a745;">+ Top Up</button>
                    </div>
                </div>
            </div>

            <!-- Vehicles -->
            <div class="vehicle-section">
                <div class="section-header"><h3>My Vehicles</h3><button class="btn-add-mini" onclick="toggleVehicleView(true)">+ Add</button></div>
                <div id="vehicleList" class="vehicle-grid"></div>
            </div>

            <!-- FAVORITE STATIONS LIST -->
            <div class="vehicle-section" style="margin-top: 25px;">
                <div class="section-header"><h3>Favorite Stations</h3></div>
                <div id="favoriteStationsList" class="vehicle-grid">
                    <p style="color:#666; font-size:0.9rem; text-align:center; width:100%;">No favorites yet.</p>
                </div>
            </div>

            <!-- MY RESERVATIONS LIST -->
            <div class="vehicle-section" style="margin-top: 25px;">
                <div class="section-header"><h3>My Reservations</h3></div>
                <div id="reservationsList" class="vehicle-grid">
                    <p style="color:#666; font-size:0.9rem; text-align:center; width:100%;">Loading reservations...</p>
                </div>
            </div>

            <div id="statusContent" class="status-section"></div>
            <button class="btn-logout btn-action" onclick="handleLogout()" style="margin-top: 20px;">Sign Out</button>
        </div>

        <!-- Add Vehicle View -->
        <div id="addView" style="display: none;">
            <div class="view-header"><button class="btn-back" onclick="toggleVehicleView(false)">← Back</button></div>
            <h2 style="margin: 20px 0;">Add New Vehicle</h2>
            <form id="vehicleForm">
                <div class="input-group"><label>Brand</label><input type="text" id="vBrand" required></div>
                <div class="input-group"><label>Model</label><input type="text" id="vModel" required></div>
                <div class="input-group"><label>Plate</label><input type="text" id="vPlate" required></div>
                <div class="info-row">
                    <div class="input-group"><label>Battery (kWh)</label><input type="number" id="vBattery" required></div>
                    <div class="input-group"><label>Connector</label><select id="vConnector"><option value="Type 2">Type 2</option><option value="CCS">CCS</option></select></div>
                </div>
                <button type="submit" class="btn-action btn-apply">Save Vehicle</button>
            </form>
        </div>
    </div>
</div>

<!-- Modal ve Alert alanları -->
<div id="topUpModal" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#1a2922; padding:30px; border-radius:20px; width:300px; text-align:center; border:1px solid #28a745;">
        <h3 style="color:#2ecc71; margin-bottom:20px;">Top Up Wallet</h3>
        <input type="number" id="topUpAmount" placeholder="500" style="width:100%; padding:10px; margin-bottom:20px; border-radius:8px; border:none;">
        <div style="display:flex; gap:10px;">
            <button onclick="closeTopUpModal()" style="flex:1; padding:10px; background:#e74c3c; border:none; border-radius:8px; color:white; cursor:pointer;">Cancel</button>
            <button onclick="submitTopUp()" style="flex:1; padding:10px; background:#28a745; border:none; border-radius:8px; color:white; cursor:pointer;">Confirm</button>
        </div>
    </div>
</div>

<!-- STANDART UYARI MODALI (Sadece OK butonu var) -->
<div id="customAlertModal" class="custom-modal-overlay" style="display:none;">
    <div class="custom-modal-box alert-box">
        <h3 id="customAlertTitle" class="modal-title"></h3>
        <p id="customAlertMessage" style="color:#ddd; margin-bottom:20px; line-height:1.4;"></p>
        <button onclick="closeCustomAlert()" class="btn-confirm" style="width:100%;">OK</button>
    </div>
</div>

<!-- YENİ: ONAY MODALI (Cancel / Confirm butonları var) -->
<div id="customConfirmModal" class="custom-modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:10000; justify-content:center; align-items:center;">
    <div class="custom-modal-box" style="background:#1a2922; border:1px solid #e74c3c; padding:30px; border-radius:15px; width:320px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <h3 id="customConfirmTitle" style="color:#e74c3c; margin-top:0; margin-bottom:15px;">Confirm Action</h3>
        <p id="customConfirmMessage" style="color:#ddd; margin-bottom:25px; line-height:1.5; font-size:14px;"></p>
        <div style="display:flex; gap:15px;">
            <button onclick="closeCustomConfirm(false)" style="flex:1; padding:12px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:8px; color:white; cursor:pointer; font-weight:bold; transition: 0.3s;">No, Keep it</button>
            <button onclick="closeCustomConfirm(true)" style="flex:1; padding:12px; background:#e74c3c; border:none; border-radius:8px; color:white; cursor:pointer; font-weight:bold; transition: 0.3s;">Yes, Cancel</button>
        </div>
    </div>
</div>

<script src="/static/script.js?v=10"></script>
</body>
</html>
