<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | EV Charging Map</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="display: block; overflow-y: auto;">

    <div class="background-overlay"></div>

    <header class="map-header">
        <div class="brand">
            <span class="brand-icon">⚡</span>
            <h1>EV Stations Map</h1>
        </div>
        <div class="user-info">
            <span id="welcomeMessage">Welcome... </span>
            <div class="nav-actions">
                <button onclick="window.location.href='/profile'" class="nav-btn profile">
                    <i class="fas fa-user"></i> Profile
                </button>
                <button onclick="logout()" class="nav-btn logout">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>
    </header>

    <!-- Map Area -->
    <div id="map" class="map-container"></div>

    <!-- YENİLENDİ: Tarayıcı önbelleğini kırmak için ?v=2 eklendi -->
    <script src="/static/dashboard.js?v=2"></script>

    <!-- Google Maps API Script -->
    <script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap" async defer></script>


    <!-- RESERVATION MODAL -->
    <div id="reservationModal" class="custom-modal-overlay" style="display: none;">
        <div class="custom-modal-box">
            <h3 class="modal-title">⚡ Reserve Charger</h3>

            <form onsubmit="submitReservation(event)">
                <div class="form-group">
                    <label>Your Vehicle</label>
                    <select id="resVehicle" required class="form-input"></select>
                </div>

                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="resDate" required class="form-input">
                </div>

                <!-- Schedule warning box -->
                <div id="scheduleBox" class="schedule-box" style="display: none;">
                    <label>📅 Occupied Hours on this Date</label>
                    <div id="occupiedTimesList" class="occupied-times">
                        <!-- Times will be injected here via JS -->
                    </div>
                </div>

                <div class="time-group">
                    <div class="form-group half-width">
                        <label>Start Time</label>
                        <input type="time" id="resStartTime" required class="form-input">
                    </div>
                    <div class="form-group half-width">
                        <label>End Time</label>
                        <input type="time" id="resEndTime" required class="form-input">
                    </div>
                </div>

                <p class="provision-note">
                    * A provision fee (100 TL) will be deducted from your wallet upon confirmation.
                </p>

                <!-- Butonları mühürlediğimiz kısım -->
                <div style="display: flex; gap: 12px; width: 100%; margin-top: 15px;">
                    <button type="button" onclick="closeReservationModal()" style="flex: 1 1 0px; margin: 0; padding: 0; height: 45px; background-color: #e74c3c; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s;">Cancel</button>
                    <button type="submit" style="flex: 1 1 0px; margin: 0; padding: 0; height: 45px; background-color: #28a745; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s;">Confirm</button>
                </div>
            </form>
        </div>
    </div>

    <!-- CUSTOM ALERT MODAL (Replaces default browser alerts) -->
    <div id="customAlertModal" class="custom-modal-overlay" style="display: none;">
        <div class="custom-modal-box alert-box">
            <h3 id="customAlertTitle" class="modal-title alert-title">Notification</h3>
            <p id="customAlertMessage" class="alert-message">Message goes here.</p>
            <div class="modal-actions">
                <button onclick="closeCustomAlert()" class="btn-confirm alert-btn">OK</button>
            </div>
        </div>
    </div>

</body>
</html>
