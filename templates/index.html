<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | EV Charging Map</title>
    <link rel="stylesheet" href="/static/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="display: block; overflow-y: auto;">

    <div class="background-overlay"></div>

    <header class="map-header">
    <div class="brand">
        <span class="brand-icon">⚡</span>
        <h1>EV Stations Map</h1>
    </div>
    <div class="user-info">
        <span id="welcomeMessage">Welcome... </span>
        <div class="nav-actions">
            <button onclick="window.location.href='/profile'" class="nav-btn profile">
                <i class="fas fa-user"></i> Profile
            </button>
            <button onclick="logout()" class="nav-btn logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>
</header>

    <!-- Harita Alanı -->
    <div id="map" style="height: 500px; width: 100%; position: relative;"></div>

    <!--  Dashboard mantığı ve logout fonksiyonları -->
    <script src="/static/dashboard.js"></script>

    <!--  Google Maps API Script (Backend'den gelen anahtar ile) -->
    <script src="https://maps.googleapis.com/maps/api/js?key={{ google_maps_api_key }}&callback=initMap" async defer></script>


    <!-- REZERVASYON MODALI -->
    <div id="reservationModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background: white; padding: 25px; border-radius: 12px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <h3 style="margin-top: 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px;">⚡ Rezerve Et</h3>

            <form onsubmit="submitReservation(event)">
                <div style="margin-bottom: 15px;">
                    <label style="display:block; font-size:14px; font-weight:bold; color:#555; margin-bottom:5px;">Aracınız</label>
                    <!-- Sadece soketi uyan araçlar JavaScript ile buraya eklenecek -->
                    <select id="resVehicle" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px;"></select>
                </div>

                <div style="margin-bottom: 15px;">
                    <label style="display:block; font-size:14px; font-weight:bold; color:#555; margin-bottom:5px;">Tarih</label>
                    <input type="date" id="resDate" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px;">
                </div>

                <div id="scheduleBox" style="margin-bottom: 15px; padding: 10px; background: #fdf2f2; border: 1px solid #f5c6c6; border-radius: 6px; display: none;">
                    <label style="display:block; font-size:13px; font-weight:bold; color:#c0392b; margin-bottom:5px;">📅 Bu Tarihteki Dolu Saatler</label>
                    <div id="occupiedTimesList" style="font-size: 13px; color: #e74c3c; font-weight: bold;">
                    <!-- Saatler buraya gelecek -->
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <div style="width: 48%;">
                        <label style="display:block; font-size:14px; font-weight:bold; color:#555; margin-bottom:5px;">Başlangıç</label>
                        <input type="time" id="resStartTime" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px;">
                    </div>
                    <div style="width: 48%;">
                        <label style="display:block; font-size:14px; font-weight:bold; color:#555; margin-bottom:5px;">Bitiş</label>
                        <input type="time" id="resEndTime" required style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 6px;">
                    </div>
                </div>

                <!-- Bilgilendirme metni (Backend'de 100 TL provizyon kestiğimiz için) -->
                <p style="font-size: 11px; color: #7f8c8d; line-height: 1.4; margin-bottom: 15px;">
                    * İşlemi onayladığınızda cüzdanınızdan provizyon bedeli (100 TL) kesilecektir.
                </p>

                <div style="display: flex; margin-top: 20px; gap: 15px; align-items: flex-start;">
                    <button type="button" onclick="closeReservationModal()" style="margin: 0 !important; flex: 1; height: 45px; background: #e74c3c; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; line-height: 45px; padding: 0;">İptal</button>
                    <button type="submit" style="margin: 0 !important; flex: 1; height: 45px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; line-height: 45px; padding: 0;">Onayla</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
