<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | EV Charging Management</title>
    <!-- CSS dosyası bağlama -->
    <link rel="stylesheet" href="/static/style.css">
    <!-- Modern yazı tipi -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Modern İkon Kütüphanesi -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Operatör seçimi için özel şık tasarım */
        .role-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background: rgba(46, 204, 113, 0.05);
            border: 1px solid rgba(46, 204, 113, 0.3);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15px;
            color: #ddd;
        }
        .role-toggle:hover {
            background: rgba(46, 204, 113, 0.15);
            border-color: #2ecc71;
        }
        .role-toggle input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2ecc71;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Arka plan parlama efekti -->
    <div class="background-overlay"></div>

    <div class="login-container">
        <form id="registerForm">
            <div class="login-header">
                <div class="brand-icon">⚡</div>
                <h2>Join Us</h2>
                <p>Start managing your EV stations today</p>
            </div>

            <div class="input-wrapper">
                <div class="input-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" id="full_name" name="full_name" required placeholder="John Doe">
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@company.com">
                </div>

                <div class="input-group">
                    <label for="reg_password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="reg_password" name="password" required placeholder="••••••••">
                        <i class="fas fa-eye" id="toggleRegisterPassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888;"></i>
                    </div>
                </div>

                <!-- YENİ: ŞIK OPERATÖR SEÇİM ALANI -->
                <label class="role-toggle" for="apply_operator">
                    <input type="checkbox" id="apply_operator">
                    <span style="flex: 1; font-size: 14px; font-weight: 600;">Apply as Station Operator</span>
                    <i class="fas fa-charging-station" style="color: #2ecc71; font-size: 18px;"></i>
                </label>

                <!-- Backend'in beklediği 'role' alanını burada dinamik tutuyoruz -->
                <input type="hidden" name="role" id="role" value="driver">

            </div>

            <button type="submit" id="registerBtn" style="margin-top: 20px;">Create Account</button>

            <!-- Mesaj alanı -->
            <div id="message"></div>

            <div class="register-section">
                <span>Already have an account?</span>
                <a href="/login">Sign In</a>
            </div>
        </form>
    </div>

    <!-- YENİ: CHECKBOX İLE GİZLİ INPUT'U BAĞLAYAN SCRIPT -->
    <script>
        document.getElementById('apply_operator').addEventListener('change', function() {
            // Checkbox işaretliyse 'operator', değilse 'driver' yaz
            document.getElementById('role').value = this.checked ? 'operator' : 'driver';
        });
    </script>

    <!-- JS dosyası -->
    <script src="/static/auth.js"></script>
</body>
</html>
