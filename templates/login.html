<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | EV Charging Management</title>
    <!-- CSS dosyası bağlama -->
    <link rel="stylesheet" href="/static/style.css">
    <!-- Modern ve temiz yazı tipi -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Modern İkon Kütüphanesi -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Arka plan parlama efekti -->
    <div class="background-overlay"></div>

    <div class="login-container">
        <form id="loginForm">
            <div class="login-header">
                <div class="brand-icon">⚡</div>
                <h2>EV Charging System</h2>
                <p>Enter your details to access the panel</p>
            </div>

            <div class="input-wrapper">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@company.com">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                        <i class="fas fa-eye" id="toggleLoginPassword" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: rgba(255,255,255,0.4); font-size: 1.1rem; transition: 0.3s;"></i>
                    </div>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> <span>Remember Me</span>
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>

            <button type="submit" id="loginBtn">Sign In to System</button>

            <!-- Hata veya bilgi mesajları -->
            <div id="message"></div>

<div class="register-section">
    <div class="user-register">
        <span>Don't have an account yet?</span>
        <a href="/register">Create New Account</a>
    </div>

    <div class="operator-divider">or</div>

    <div class="operator-apply">
        <span>Want to manage a station?</span>
        <a href="/operator-apply" class="apply-link">Apply as Operator</a>
    </div>
</div>
        </form>

    <!-- Backend bağlantısını sağlayan JavaScript -->
    <script src="/static/auth.js"></script>
</body>
</html>
